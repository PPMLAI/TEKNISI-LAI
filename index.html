body { 
	font-family: Arial, sans-serif;

	padding: 0;

	min-height: 100vh; 
	} 
	
	.container { 
	width: 100%; max-width: 500px; 
	background: white; border-radius: 16px;

	font-size: 32px;

	.menu { 
	display: flex; 
	flex-direction: column; 
	gap: 12px; 
	} 
	
	.menu a { 
	text-decoration: none; 
	padding: 14px; 
	border-radius: 12px; 
	background: #2563eb; 
	color: white; 
	font-weight: 600; 
	transition: 0.2s; 
	} 
	
	.menu a:hover { 
	background: #1d4ed8;
